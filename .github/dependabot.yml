version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 5
      commit-message:
          prefix: "chore"
      labels:
          - "dependencies"
          - "dependabot"
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 2
      commit-message:
          prefix: "chore"
      labels:
          - "dependencies"
          - "dependabot"
